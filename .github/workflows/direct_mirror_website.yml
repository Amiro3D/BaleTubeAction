name: Mirror Website

on:
  repository_dispatch:
    types: [bale_mirror]

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Install dependencies
      run: pip install requests beautifulsoup4 lxml 2>/dev/null || pip3 install requests beautifulsoup4 lxml 2>/dev/null || true

    - name: Mirror website
      env:
        BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        TARGET_URL: ${{ github.event.client_payload.url }}
        CHAT_ID: ${{ github.event.client_payload.chat_id }}
        PROGRESS_MSG_ID: ${{ github.event.client_payload.msg_id || '' }}
      run: |
        set -e
        python3 - "$TARGET_URL" "$CHAT_ID" "$PROGRESS_MSG_ID" "$BALE_BOT_TOKEN" << 'PYEOF'
        import os, sys, re, json, hashlib, mimetypes, zipfile, shutil, tempfile, base64
        from urllib.parse import urljoin, urlparse, unquote, urldefrag
        from pathlib import Path

        import requests
        from bs4 import BeautifulSoup

        BASE_URL = sys.argv[1]
        CHAT_ID = sys.argv[2]
        PROGRESS_MSG_ID = sys.argv[3]
        BOT_TOKEN = sys.argv[4]
        API = f"https://tapi.bale.ai/bot{BOT_TOKEN}"
        TIMEOUT = 15

        session = requests.Session()
        session.headers.update({
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
            'Accept': '*/*',
            'Accept-Language': 'en-US,en;q=0.9',
        })

        def api(method, **kwargs):
            try:
                r = requests.post(f"{API}/{method}", timeout=10, **kwargs)
                return r.json()
            except: return {}

        def progress(text):
            if PROGRESS_MSG_ID:
                try: api('editMessageText', data={'chat_id': CHAT_ID, 'message_id': PROGRESS_MSG_ID, 'text': text})
                except: pass

        def resolve(url_str, base):
            full = urljoin(base, url_str)
            full, _ = urldefrag(full)
            return full

        def url_to_local(abs_url):
            p = urlparse(abs_url)
            path = unquote(p.path).lstrip('/')
            if not path: return 'index.html'
            parts = path.split('/')
            if '.' not in parts[-1]: path += '.html'
            return path

        downloaded = {}

        def download(abs_url):
            """Download URL, return (local_path, content_bytes)."""
            if not abs_url or abs_url.startswith('data:'):
                return None, None
            if abs_url in downloaded:
                return downloaded[abs_url]
            try:
                r = session.get(abs_url, timeout=TIMEOUT)
                r.raise_for_status()
                local = url_to_local(abs_url)
                downloaded[abs_url] = (local, r.content)
                return local, r.content
            except:
                return None, None

        def to_data_uri(content, content_type):
            """Convert bytes to data URI."""
            b64 = base64.b64encode(content).decode()
            return f"data:{content_type};base64,{b64}"

        def mimetoext(ct):
            return mimetypes.guess_extension(ct.split(';')[0].strip()) or ''

        # ── Fetch page ──
        try:
            resp = session.get(BASE_URL, timeout=TIMEOUT, allow_redirects=True)
            resp.raise_for_status()
            final_url = resp.url
            html = resp.text
        except Exception as e:
            api('sendMessage', data={'chat_id': CHAT_ID, 'text': f'❌ Failed to fetch: {e}'})
            sys.exit(0)

        parsed_page = urlparse(final_url)
        work = tempfile.mkdtemp()
        work_dir = Path(work)
        total_files = 0

        soup = BeautifulSoup(html, 'lxml')

        # ── REMOVE <base> tag (causes CORS on file://) ──
        for base in soup.find_all('base'):
            base.decompose()

        # ── Strip type="module" from scripts (can't load from file://) ──
        for script in soup.find_all('script', type='module'):
            del script['type']

        # ── CSS: download and inline as <style> ──
        for link in soup.find_all('link', rel='stylesheet'):
            href = link.get('href')
            if not href: continue
            full = resolve(href, final_url)
            progress(f'🌐 Mirroring...\n\n📥 CSS: {full.split("/")[-1][:50]}...')
            local, content = download(full)
            if content:
                css_text = content.decode('utf-8', errors='replace')

                # Process @import - inline imported CSS
                def imp_replace(m):
                    imp_url = m.group(1).strip().strip("'\"")
                    if imp_url.startswith('data:'): return m.group(0)
                    imp_full = resolve(imp_url, full)
                    _, imp_content = download(imp_full)
                    if imp_content:
                        return imp_content.decode('utf-8', errors='replace')
                    return m.group(0)
                css_text = re.sub(r'@import\s+["\']?([^"\';\)]+)["\']?\s*;', imp_replace, css_text)

                # Process url() - convert fonts to data URIs, keep images as files
                def css_url_replace(m):
                    u = m.group(1).strip().strip("'\"")
                    if u.startswith('data:') or u.startswith('#'): return m.group(0)
                    url_full = resolve(u, full)
                    _, content_bytes = download(url_full)
                    if not content_bytes: return m.group(0)
                    ct = ''
                    try:
                        r_head = session.head(url_full, timeout=5)
                        ct = r_head.headers.get('content-type', '')
                    except: pass
                    # Fonts -> inline as data URI (file:// blocks font loading)
                    if any(x in (ct + u).lower() for x in ['font', 'woff', 'woff2', 'ttf', 'otf', 'eot']):
                        return f'url({to_data_uri(content_bytes, ct or "font/woff2")})'
                    # Small images (< 20KB) -> inline
                    if len(content_bytes) < 20000:
                        return f'url({to_data_uri(content_bytes, ct or "image/png")})'
                    # Larger images -> save as file
                    local_img = url_to_local(url_full)
                    img_path = work_dir / local_img
                    img_path.parent.mkdir(parents=True, exist_ok=True)
                    img_path.write_bytes(content_bytes)
                    return f'url("{local_img}")'
                css_text = re.sub(r'url\(([^)]+)\)', css_url_replace, css_text)

                # Inline the CSS
                style_tag = soup.new_tag('style')
                style_tag.string = css_text
                link.replace_with(style_tag)
                total_files += 1

        # ── Inline <style> blocks - process url() ──
        for s in soup.find_all('style'):
            if not s.string: continue
            def style_url(m):
                u = m.group(1).strip().strip("'\"")
                if u.startswith('data:') or u.startswith('#'): return m.group(0)
                url_full = resolve(u, final_url)
                _, content_bytes = download(url_full)
                if not content_bytes: return m.group(0)
                ct = ''
                try:
                    r_head = session.head(url_full, timeout=5)
                    ct = r_head.headers.get('content-type', '')
                except: pass
                if any(x in (ct + u).lower() for x in ['font', 'woff', 'woff2', 'ttf', 'otf', 'eot']):
                    return f'url({to_data_uri(content_bytes, ct or "font/woff2")})'
                if len(content_bytes) < 20000:
                    return f'url({to_data_uri(content_bytes, ct or "image/png")})'
                local_img = url_to_local(url_full)
                img_path = work_dir / local_img
                img_path.parent.mkdir(parents=True, exist_ok=True)
                img_path.write_bytes(content_bytes)
                return f'url("{local_img}")'
            s.string = re.sub(r'url\(([^)]+)\)', style_url, s.string)

        # ── JS: download and inline as <script> ──
        for script in soup.find_all('script', src=True):
            src = script.get('src')
            if not src: continue
            full = resolve(src, final_url)
            progress(f'🌐 Mirroring...\n\n📥 JS: {full.split("/")[-1][:50]}...')
            local, content = download(full)
            if content:
                # Strip type="module" if present
                if script.get('type') == 'module':
                    del script['type']
                code = content.decode('utf-8', errors='replace')
                del script['src']
                script.string = code
                total_files += 1

        # ── Images: download and save as files ──
        for img in soup.find_all('img', src=True):
            src = img.get('src')
            if not src or src.startswith('data:'): continue
            full = resolve(src, final_url)
            progress(f'🌐 Mirroring...\n\n📥 Image: {full.split("/")[-1][:50]}...')
            local, content = download(full)
            if local and content:
                img_path = work_dir / local
                img_path.parent.mkdir(parents=True, exist_ok=True)
                img_path.write_bytes(content)
                img['src'] = local
                total_files += 1
            # srcset
            ss = img.get('srcset')
            if ss:
                out = []
                for p in ss.split(','):
                    p = p.strip()
                    if not p: continue
                    t = p.split()
                    u, d = t[0], ' '.join(t[1:])
                    fn, cnt = download(resolve(u, final_url))
                    if fn and cnt:
                        fp = work_dir / fn
                        fp.parent.mkdir(parents=True, exist_ok=True)
                        fp.write_bytes(cnt)
                        out.append(f"{fn} {d}".strip())
                    else:
                        out.append(p)
                img['srcset'] = ', '.join(out)

        # ── <source srcset> ──
        for src in soup.find_all('source', srcset=True):
            ss = src.get('srcset')
            if not ss: continue
            out = []
            for p in ss.split(','):
                p = p.strip()
                if not p: continue
                t = p.split()
                u, d = t[0], ' '.join(t[1:])
                fn, cnt = download(resolve(u, final_url))
                if fn and cnt:
                    fp = work_dir / fn
                    fp.parent.mkdir(parents=True, exist_ok=True)
                    fp.write_bytes(cnt)
                    out.append(f"{fn} {d}".strip())
                else:
                    out.append(p)
            src['srcset'] = ', '.join(out)

        # ── Video/Audio ──
        for tag in soup.find_all(['video', 'audio']):
            for attr in ['src', 'poster']:
                val = tag.get(attr)
                if val and not val.startswith('data:'):
                    local, cnt = download(resolve(val, final_url))
                    if local and cnt:
                        fp = work_dir / local
                        fp.parent.mkdir(parents=True, exist_ok=True)
                        fp.write_bytes(cnt)
                        tag[attr] = local
                        total_files += 1

        # ── Inline style url() ──
        for tag in soup.find_all(style=True):
            def ri(m):
                u = m.group(1).strip().strip("'\"")
                if u.startswith('data:') or u.startswith('#'): return m.group(0)
                url_full = resolve(u, final_url)
                _, cnt = download(url_full)
                if not cnt: return m.group(0)
                ct = ''
                try:
                    r_head = session.head(url_full, timeout=5)
                    ct = r_head.headers.get('content-type', '')
                except: pass
                if any(x in (ct + u).lower() for x in ['font', 'woff', 'woff2', 'ttf', 'otf', 'eot']):
                    return f'url({to_data_uri(cnt, ct or "font/woff2")})'
                if len(cnt) < 20000:
                    return f'url({to_data_uri(cnt, ct or "image/png")})'
                local_img = url_to_local(url_full)
                fp = work_dir / local_img
                fp.parent.mkdir(parents=True, exist_ok=True)
                fp.write_bytes(cnt)
                return f'url("{local_img}")'
            tag['style'] = re.sub(r'url\(([^)]+)\)', ri, tag['style'])

        # ── Favicons ──
        for link in soup.find_all('link', rel=True):
            rel = link.get('rel', [])
            if isinstance(rel, str): rel = [rel]
            if any(r in ['icon','shortcut icon','apple-touch-icon','apple-touch-icon-precomposed'] for r in rel):
                href = link.get('href')
                if href and not href.startswith('data:'):
                    local, cnt = download(resolve(href, final_url))
                    if local and cnt:
                        fp = work_dir / local
                        fp.parent.mkdir(parents=True, exist_ok=True)
                        fp.write_bytes(cnt)
                        link['href'] = local

        # ── Offline banner ──
        bs = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#1a1a2e;color:#e0e0e0;padding:10px 16px;font-family:system-ui,sans-serif;font-size:13px;text-align:center;border-bottom:2px solid #16213e;'
        b = soup.new_tag('div', style=bs)
        b.string = f'📱 Offline mirror: {parsed_page.netloc}{parsed_page.path}'
        if soup.body: soup.body.insert(0, b)

        # Save HTML
        (work_dir / 'index.html').write_text(str(soup), encoding='utf-8')

        progress(f'🌐 Mirroring...\n\n📦 Packaging...')

        # ── Zip ──
        zip_path = Path(work) / 'mirror.zip'
        with zipfile.ZipFile(zip_path, 'w', zipfile.ZIP_DEFLATED) as zf:
            for f in work_dir.rglob('*'):
                if f.is_file():
                    zf.write(f, f.relative_to(work_dir))

        sz = zip_path.stat().st_size
        if sz < 500:
            api('sendMessage', data={'chat_id': CHAT_ID, 'text': f'❌ Mirror failed. Page may need JS rendering.\nURL: {BASE_URL}'})
            if PROGRESS_MSG_ID:
                try: api('deleteMessage', data={'chat_id': CHAT_ID, 'message_id': PROGRESS_MSG_ID})
                except: pass
            sys.exit(0)

        progress(f'🌐 Mirroring...\n\n📤 Uploading ({sz // 1024}KB)...')

        if sz > 50 * 1024 * 1024:
            ps = 50 * 1024 * 1024
            parts = []
            with open(zip_path, 'rb') as f:
                while True:
                    c = f.read(ps)
                    if not c: break
                    parts.append(c)
            for i, c in enumerate(parts):
                pp = Path(work) / f'mirror_part{i+1}.zip'
                pp.write_bytes(c)
                api('sendDocument', data={'chat_id': CHAT_ID, 'caption': f'🌐 Mirror: {parsed_page.netloc} ({i+1}/{len(parts)})'}, files={'document': open(pp, 'rb')})
        else:
            api('sendDocument', data={'chat_id': CHAT_ID, 'caption': f'🌐 Mirror: {parsed_page.netloc}\n📦 {total_files} files · {sz // 1024}KB'}, files={'document': open(zip_path, 'rb')})

        if PROGRESS_MSG_ID:
            try: api('deleteMessage', data={'chat_id': CHAT_ID, 'message_id': PROGRESS_MSG_ID})
            except: pass

        shutil.rmtree(work, ignore_errors=True)
        print(f"Done: {total_files} files, {sz} bytes")
        PYEOF
