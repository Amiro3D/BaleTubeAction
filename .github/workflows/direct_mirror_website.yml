name: Mirror Website

on:
  repository_dispatch:
    types: [bale_mirror]

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Install dependencies
      run: pip install requests beautifulsoup4 lxml jsbeautifier 2>/dev/null || pip3 install requests beautifulsoup4 lxml jsbeautifier 2>/dev/null || true

    - name: Mirror website
      env:
        BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        TARGET_URL: ${{ github.event.client_payload.url }}
        CHAT_ID: ${{ github.event.client_payload.chat_id }}
        PROGRESS_MSG_ID: ${{ github.event.client_payload.msg_id || '' }}
      run: |
        set -e
        python3 - "$TARGET_URL" "$CHAT_ID" "$PROGRESS_MSG_ID" "$BALE_BOT_TOKEN" << 'PYEOF'
        import os, sys, re, json, hashlib, mimetypes, zipfile, shutil, tempfile
        from urllib.parse import urljoin, urlparse, unquote, urldefrag
        from pathlib import Path

        import requests
        from bs4 import BeautifulSoup

        BASE_URL = sys.argv[1]
        CHAT_ID = sys.argv[2]
        PROGRESS_MSG_ID = sys.argv[3]
        BOT_TOKEN = sys.argv[4]
        API = f"https://tapi.bale.ai/bot{BOT_TOKEN}"
        TIMEOUT = 15

        session = requests.Session()
        session.headers.update({
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
            'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8',
            'Accept-Language': 'en-US,en;q=0.9',
        })

        def api(method, **kwargs):
            try:
                r = requests.post(f"{API}/{method}", timeout=10, **kwargs)
                return r.json()
            except: return {}

        def progress(text):
            if PROGRESS_MSG_ID:
                try: api('editMessageText', data={'chat_id': CHAT_ID, 'message_id': PROGRESS_MSG_ID, 'text': text})
                except: pass

        def resolve(url_str, base):
            full = urljoin(base, url_str)
            full, _ = urldefrag(full)
            return full

        def url_to_local(abs_url):
            """URL path -> local file path preserving directory structure."""
            p = urlparse(abs_url)
            path = unquote(p.path).lstrip('/')
            if not path: return 'index.html'
            # If last segment has no extension, it's a page
            parts = path.split('/')
            if '.' not in parts[-1]:
                path += '.html'
            return path

        downloaded = set()

        def download(abs_url, work_dir):
            """Download URL, save preserving path structure. Return local relative path."""
            if not abs_url or abs_url.startswith('data:') or abs_url in downloaded:
                local = url_to_local(abs_url) if abs_url not in ('', None) else None
                return local if local and (work_dir / local).exists() else None

            local = url_to_local(abs_url)
            fpath = work_dir / local
            if fpath.exists():
                downloaded.add(abs_url)
                return local

            try:
                r = session.get(abs_url, timeout=TIMEOUT)
                r.raise_for_status()
                fpath.parent.mkdir(parents=True, exist_ok=True)
                fpath.write_bytes(r.content)
                downloaded.add(abs_url)
                return local
            except:
                return None

        def beautify_js(code):
            try:
                import jsbeautifier
                opts = jsbeautifier.default_options()
                opts.indent_size = 2
                result = jsbeautifier.beautify(code, opts)
                return result if len(result) > len(code) * 1.1 else code
            except: return code

        def process_css(css_text, css_url, work_dir):
            def rep_import(m):
                u = m.group(1).strip().strip("'\"")
                if u.startswith('data:'): return m.group(0)
                full = resolve(u, css_url)
                loc = download(full, work_dir)
                return f'@import url("{loc}");' if loc else m.group(0)
            css_text = re.sub(r'@import\s+["\']?([^"\';\)]+)["\']?\s*;', rep_import, css_text)

            def rep_url(m):
                u = m.group(1).strip().strip("'\"")
                if u.startswith('data:') or u.startswith('#'): return m.group(0)
                full = resolve(u, css_url)
                loc = download(full, work_dir)
                return f'url("{loc}")' if loc else m.group(0)
            css_text = re.sub(r'url\(([^)]+)\)', rep_url, css_text)
            return css_text

        # ── Fetch page ──
        try:
            resp = session.get(BASE_URL, timeout=TIMEOUT, allow_redirects=True)
            resp.raise_for_status()
            final_url = resp.url
            html = resp.text
        except Exception as e:
            api('sendMessage', data={'chat_id': CHAT_ID, 'text': f'❌ Failed to fetch page: {e}'})
            sys.exit(0)

        parsed_page = urlparse(final_url)
        work = tempfile.mkdtemp()
        work_dir = Path(work)
        total = 0

        soup = BeautifulSoup(html, 'lxml')

        # ── CSS links ──
        for link in soup.find_all('link', rel='stylesheet'):
            href = link.get('href')
            if not href: continue
            full = resolve(href, final_url)
            progress(f'🌐 Mirroring...\n\n📥 CSS: {full[:60]}...')
            local = download(full, work_dir)
            if local:
                try:
                    r = session.get(full, timeout=TIMEOUT)
                    css = process_css(r.text, full, work_dir)
                    (work_dir / local).write_text(css, encoding='utf-8')
                except: pass
                link['href'] = local
                total += 1

        # ── Inline <style> ──
        for s in soup.find_all('style'):
            if s.string: s.string = process_css(s.string, final_url, work_dir)

        # ── JS ──
        for script in soup.find_all('script', src=True):
            src = script.get('src')
            if not src: continue
            full = resolve(src, final_url)
            progress(f'🌐 Mirroring...\n\n📥 JS: {full[:60]}...')
            local = download(full, work_dir)
            if local:
                try:
                    code = (work_dir / local).read_text(encoding='utf-8', errors='replace')
                    (work_dir / local).write_text(beautify_js(code), encoding='utf-8')
                except: pass
                script['src'] = local
                total += 1

        # ── Images ──
        for img in soup.find_all('img', src=True):
            src = img.get('src')
            if not src or src.startswith('data:'): continue
            full = resolve(src, final_url)
            progress(f'🌐 Mirroring...\n\n📥 Image: {full[:60]}...')
            local = download(full, work_dir)
            if local:
                img['src'] = local
                total += 1
            # srcset
            ss = img.get('srcset')
            if ss:
                out = []
                for p in ss.split(','):
                    p = p.strip()
                    if not p: continue
                    t = p.split()
                    u, d = t[0], ' '.join(t[1:])
                    fn = download(resolve(u, final_url), work_dir)
                    out.append(f"{fn} {d}".strip() if fn else p)
                img['srcset'] = ', '.join(out)

        # ── <source srcset> ──
        for src in soup.find_all('source', srcset=True):
            ss = src.get('srcset')
            if not ss: continue
            out = []
            for p in ss.split(','):
                p = p.strip()
                if not p: continue
                t = p.split()
                u, d = t[0], ' '.join(t[1:])
                fn = download(resolve(u, final_url), work_dir)
                out.append(f"{fn} {d}".strip() if fn else p)
            src['srcset'] = ', '.join(out)

        # ── Video/Audio ──
        for tag in soup.find_all(['video', 'audio']):
            for attr in ['src', 'poster']:
                val = tag.get(attr)
                if val and not val.startswith('data:'):
                    local = download(resolve(val, final_url), work_dir)
                    if local: tag[attr] = local; total += 1

        # ── Inline style url() ──
        for tag in soup.find_all(style=True):
            def ri(m):
                u = m.group(1).strip().strip("'\"")
                if u.startswith('data:') or u.startswith('#'): return m.group(0)
                loc = download(resolve(u, final_url), work_dir)
                return f'url("{loc}")' if loc else m.group(0)
            tag['style'] = re.sub(r'url\(([^)]+)\)', ri, tag['style'])

        # ── Favicons ──
        for link in soup.find_all('link', rel=True):
            rel = link.get('rel', [])
            if isinstance(rel, str): rel = [rel]
            if any(r in ['icon','shortcut icon','apple-touch-icon','apple-touch-icon-precomposed'] for r in rel):
                href = link.get('href')
                if href and not href.startswith('data:'):
                    local = download(resolve(href, final_url), work_dir)
                    if local: link['href'] = local

        # ── Offline banner ──
        bs = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#1a1a2e;color:#e0e0e0;padding:10px 16px;font-family:system-ui,sans-serif;font-size:13px;text-align:center;border-bottom:2px solid #16213e;'
        b = soup.new_tag('div', style=bs)
        b.string = f'📱 Offline mirror: {parsed_page.netloc}{parsed_page.path}'
        if soup.body: soup.body.insert(0, b)

        (work_dir / 'index.html').write_text(str(soup), encoding='utf-8')

        progress(f'🌐 Mirroring...\n\n📦 Packaging {total} resources...')

        zip_path = Path(work) / 'mirror.zip'
        with zipfile.ZipFile(zip_path, 'w', zipfile.ZIP_DEFLATED) as zf:
            for f in work_dir.rglob('*'):
                if f.is_file(): zf.write(f, f.relative_to(work_dir))

        sz = zip_path.stat().st_size
        if sz < 500:
            api('sendMessage', data={'chat_id': CHAT_ID, 'text': f'❌ Mirror failed. Page may need JS rendering.\nURL: {BASE_URL}'})
            if PROGRESS_MSG_ID:
                try: api('deleteMessage', data={'chat_id': CHAT_ID, 'message_id': PROGRESS_MSG_ID})
                except: pass
            sys.exit(0)

        progress(f'🌐 Mirroring...\n\n📤 Uploading ({sz // 1024}KB)...')

        if sz > 50 * 1024 * 1024:
            ps = 50 * 1024 * 1024
            parts = []
            with open(zip_path, 'rb') as f:
                while True:
                    c = f.read(ps)
                    if not c: break
                    parts.append(c)
            for i, c in enumerate(parts):
                pp = Path(work) / f'mirror_part{i+1}.zip'
                pp.write_bytes(c)
                api('sendDocument', data={'chat_id': CHAT_ID, 'caption': f'🌐 Mirror: {parsed_page.netloc} ({i+1}/{len(parts)})'}, files={'document': open(pp, 'rb')})
        else:
            api('sendDocument', data={'chat_id': CHAT_ID, 'caption': f'🌐 Mirror: {parsed_page.netloc}\n📦 {total} resources · {sz // 1024}KB'}, files={'document': open(zip_path, 'rb')})

        if PROGRESS_MSG_ID:
            try: api('deleteMessage', data={'chat_id': CHAT_ID, 'message_id': PROGRESS_MSG_ID})
            except: pass

        shutil.rmtree(work, ignore_errors=True)
        print(f"Done: {total} resources, {sz} bytes")
        PYEOF
