name: AI Imagine (Perchance)

on:
  repository_dispatch:
    types: [bale_imagine]

jobs:
  imagine:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
    - name: Generate image and send to Bale
      env:
        BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        PROMPT: ${{ github.event.client_payload.prompt }}
        SHAPE: ${{ github.event.client_payload.shape || 'square' }}
        SEED: ${{ github.event.client_payload.seed || '-1' }}
        CHAT_ID: ${{ github.event.client_payload.chat_id }}
        MSG_ID: ${{ github.event.client_payload.msg_id || '' }}
        GROUP_CHAT_ID: ${{ github.event.client_payload.group_chat_id || '' }}
        WORKER_URL: ${{ secrets.WORKER_URL }}
      run: |
        set +e
        echo "::group::Install Playwright + xvfb"
        python -m pip install --quiet --upgrade pip
        python -m pip install --quiet playwright
        # xvfb is needed for headful-Chrome impersonation; Cloudflare's
        # Turnstile is much harder on truly-headless Chromium.
        sudo apt-get install -y xvfb >/dev/null 2>&1 || true
        python -m playwright install --with-deps chromium >/dev/null 2>&1
        echo "::endgroup::"

        API="https://tapi.bale.ai/bot${BALE_BOT_TOKEN}"

        # send_with_retry: POST to a Bale API method with curl multipart args,
        # retry on HTTP 429 (honoring retry_after) and 5xx. Returns last body.
        send_with_retry() {
          local API_URL="$1"; shift
          local MAX_RETRIES=5
          local RESP ERROR_CODE RETRY_AFTER
          for i in $(seq 1 $MAX_RETRIES); do
            RESP=$(curl -s -X POST "$API_URL" "$@")
            ERROR_CODE=$(printf '%s' "$RESP" | grep -o '"error_code":[0-9]*' | head -1 | cut -d: -f2)
            if [ "$ERROR_CODE" = "429" ]; then
              RETRY_AFTER=$(printf '%s' "$RESP" | grep -o '"retry_after":[0-9]*' | head -1 | cut -d: -f2)
              RETRY_AFTER=${RETRY_AFTER:-5}
              echo "send_with_retry: 429. Sleeping ${RETRY_AFTER}s (attempt $i/$MAX_RETRIES)" >&2
              sleep $((RETRY_AFTER + 2))
              continue
            fi
            if [ -n "$ERROR_CODE" ] && [ "$ERROR_CODE" -ge 500 ] 2>/dev/null; then
              echo "send_with_retry: Bale error_code=$ERROR_CODE (attempt $i/$MAX_RETRIES)" >&2
              sleep "$i"
              continue
            fi
            printf '%s' "$RESP"
            return 0
          done
          printf '%s' "$RESP"
        }

        # notify_user: send a Persian error message and (optionally) delete
        # the in-chat progress message. Used on every failure path.
        notify_user() {
          local TEXT="$1"
          if [ -n "$MSG_ID" ]; then
            curl -s -X POST "$API/deleteMessage" -F "chat_id=$CHAT_ID" -F "message_id=$MSG_ID" > /dev/null 2>&1 || true
          fi
          send_with_retry "$API/sendMessage" -F "chat_id=$CHAT_ID" -F "text=$TEXT" > /dev/null || true
          if [ -n "$GROUP_CHAT_ID" ] && [ "$GROUP_CHAT_ID" != "0" ]; then
            send_with_retry "$API/sendMessage" -F "chat_id=$GROUP_CHAT_ID" -F "text=$TEXT" > /dev/null || true
          fi
        }

        OUTFILE="/tmp/imagine_$$.jpg"
        OUTEXT="jpg"
        export OUTFILE

        # Main Python step — Playwright mints userKey, POSTs /api/generate,
        # fetches image bytes, writes them to $OUTFILE. Prints extension to
        # stdout on success; on failure, prints "ERROR: <reason>" to stdout.
        GENRESULT=$(xvfb-run -a --server-args="-screen 0 1280x800x24" python << 'PYEOF'
        import asyncio, json, os, random, re, sys

        API = "https://image-generation.perchance.org/api"
        PROMPT = os.environ["PROMPT"]
        SHAPE = os.environ.get("SHAPE", "square")
        SEED_RAW = os.environ.get("SEED", "-1")
        OUTFILE = os.environ["OUTFILE"]

        try:
            seed = int(SEED_RAW)
        except Exception:
            seed = -1

        SHAPE_MAP = {
            "square":    "768x768",
            "portrait":  "512x768",
            "landscape": "768x512",
        }
        resolution = SHAPE_MAP.get(SHAPE, "768x768")

        from playwright.async_api import async_playwright

        # Stealth init script — patches the well-known automation fingerprints
        # (navigator.webdriver, window.chrome, Permissions API, plugins) so that
        # Cloudflare's Turnstile challenge rates the session as a real Chrome
        # user.  This is the standard Playwright-stealth recipe; we hard-code
        # it instead of depending on playwright_stealth PyPI to keep the
        # install minimal.
        STEALTH_JS = r"""
        (() => {
            Object.defineProperty(navigator, 'webdriver', {get: () => undefined});
            Object.defineProperty(navigator, 'languages', {get: () => ['en-US', 'en']});
            Object.defineProperty(navigator, 'plugins', {
                get: () => [1, 2, 3, 4, 5],
            });
            window.chrome = { runtime: {} };
            const originalQuery = window.navigator.permissions && window.navigator.permissions.query;
            if (originalQuery) {
                window.navigator.permissions.query = (parameters) =>
                    parameters.name === 'notifications'
                        ? Promise.resolve({state: Notification.permission})
                        : originalQuery(parameters);
            }
        })();
        """

        async def main():
            async with async_playwright() as p:
                # headful Chrome under xvfb is the most believable session —
                # truly-headless Chromium leaks too many automation signals
                # for Cloudflare's Turnstile challenge.
                browser = await p.chromium.launch(
                    headless=False,
                    args=[
                        "--no-sandbox",
                        "--disable-dev-shm-usage",
                        "--disable-blink-features=AutomationControlled",
                        "--disable-gpu",
                        "--window-size=1280,800",
                        "--start-maximized",
                    ],
                )
                ctx = await browser.new_context(
                    user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                               "AppleWebKit/537.36 (KHTML, like Gecko) "
                               "Chrome/126.0.0.0 Safari/537.36",
                    viewport={"width": 1280, "height": 800},
                    locale="en-US",
                    timezone_id="America/New_York",
                    extra_http_headers={
                        "Accept-Language": "en-US,en;q=0.9",
                        "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
                    },
                )
                await ctx.add_init_script(STEALTH_JS)
                page = await ctx.new_page()

                # 1. Mint userKey. Strategy: visit the human-facing
                # https://perchance.org/ai-text-to-image-generator page and let
                # its own JS populate window.__USER_DATA__ (which contains the
                # userKey). This is what a real browser session would do, so
                # Cloudflare's silent Turnstile auto-passes and Perchance's
                # JS handler writes the key into the page it already trusts.
                # Fallback: hit /api/verifyUser directly and regex-scrape the
                # "userKey":"..." string out of the resulting HTML.
                user_key = None
                last_diag = ""

                async def _wait_cf_clear(timeout_s=30):
                    """If Cloudflare's 'Just a moment...' interstitial is the
                    current document, poll until it either clears (the title
                    stops being 'Just a moment...' and the body no longer
                    contains 'cf-mitigated') or the timeout elapses.  Returns
                    silently either way; the caller re-reads page state after."""
                    try:
                        await page.wait_for_function(
                            "() => document.title !== 'Just a moment...' "
                            "&& !document.documentElement.innerHTML.includes('cf-mitigated')",
                            timeout=timeout_s * 1000
                        )
                    except Exception:
                        pass

                async def try_mint_via_page(pages_url):
                    """Navigate to a Perchance page; wait for window.__USER_DATA__."""
                    nonlocal last_diag
                    for attempt in range(3):
                        try:
                            await page.goto(pages_url,
                                            wait_until="domcontentloaded",
                                            timeout=45000)
                            # Cloudflare's 'Just a moment...' interstitial loads
                            # first.  Wait for it to clear before scraping
                            # window.__USER_DATA__.
                            await _wait_cf_clear(timeout_s=30)
                            # Cloudflare's silent Turnstile takes 5-10s to
                            # solve and write cookies. Wait for either
                            # window.__USER_DATA__ to appear, or 25s max.
                            try:
                                await page.wait_for_function(
                                    "() => !!(window.__USER_DATA__ && window.__USER_DATA__.userKey)",
                                    timeout=25000
                                )
                            except Exception:
                                # Page loaded but __USER_DATA__ never arrived.
                                # Record page state so the next log shows why.
                                try:
                                    title = await page.title()
                                except Exception:
                                    title = "<no title>"
                                try:
                                    body_short = (await page.content())[:300]
                                except Exception:
                                    body_short = "<no body>"
                                last_diag += (
                                    f"page-attempt{attempt} "
                                    f"title={title!r} "
                                    f"body={body_short!r}; "
                                )
                                await page.wait_for_timeout(2500)
                                continue
                            dat = await page.evaluate(
                                "() => (window.__USER_DATA__ && window.__USER_DATA__.userKey) ? window.__USER_DATA__.userKey : null"
                            )
                            if dat and re.fullmatch(r"[a-f0-9]{64}", dat):
                                return dat
                        except Exception as e:
                            last_diag += f"page-attempt{attempt} err={e}; "
                        await page.wait_for_timeout(2500)
                    return None

                async def try_mint_via_verifyuser():
                    """Hit /api/verifyUser directly and regex out userKey."""
                    nonlocal last_diag
                    for attempt in range(3):
                        cache_bust = random.random()
                        verify_url = f"{API}/verifyUser?thread=0&__cacheBust={cache_bust}"
                        try:
                            await page.goto(verify_url,
                                            wait_until="domcontentloaded",
                                            timeout=45000)
                            # The verifyUser URL itself returns the userKey
                            # once CF clears; wait for the 'Just a moment...'
                            # interstitial to resolve, then read the body.
                            await _wait_cf_clear(timeout_s=30)
                            content = await page.content()
                            if "too_many_requests" in content:
                                return ("RATE_LIMIT", None)
                            m = re.search(r'"userKey":"([a-f0-9]{64})"', content)
                            if m:
                                return (None, m.group(1))
                            try:
                                title = await page.title()
                            except Exception:
                                title = "<no title>"
                            last_diag += (
                                f"verify-attempt{attempt} "
                                f"title={title!r} "
                                f"bodylen={len(content)} "
                                f"snippet={content[:200]!r}; "
                            )
                        except Exception as e:
                            last_diag += f"verify-attempt{attempt} err={e}; "
                        await page.wait_for_timeout(2500)
                    return (None, None)

                user_key = await try_mint_via_page("https://perchance.org/ai-text-to-image-generator")
                if not user_key:
                    print(f"mint: page fallback to verifyUser. diag={last_diag}", file=sys.stderr)
                    err, key = await try_mint_via_verifyuser()
                    if err == "RATE_LIMIT":
                        await browser.close()
                        print("ERROR:RATE_LIMIT")
                        return
                    if key:
                        user_key = key
                    else:
                        print(f"mint failed: cf challenge. diag={last_diag}", file=sys.stderr)
                        await browser.close()
                        print("ERROR:CF_CHALLENGE")
                        return

                # 2. POST /api/generate and download via the page.request helper
                # (an APIRequestContext bound to this browser context). It uses
                # the same cookies/UA as the page itself and bypasses CORS,
                # which lets us call image-generation.perchance.org from the
                # perchance.org origin without CORS preflight issues.
                gen_url = (f"{API}/generate"
                           f"?userKey={user_key}"
                           f"&requestId=aiImageCompletion{random.randint(0, 2**30)}"
                           f"&__cacheBust={random.random()}")
                body = {
                    "generatorName":  "ai-image-generator",
                    "channel":        "ai-text-to-image-generator",
                    "subChannel":     "public",
                    "prompt":         PROMPT,
                    "negativePrompt": "",
                    "seed":           seed,
                    "resolution":     resolution,
                    "guidanceScale":  7.0,
                }

                async def post_generate():
                    r = await page.request.post(gen_url, {
                        "headers": {"Content-Type": "application/json"},
                        "data": json.dumps(body),
                        "timeout": 60000,
                    })
                    text = await r.text()
                    try:
                        return json.loads(text)
                    except Exception:
                        return {"status": "parse_error", "body": text[:200]}

                gen_json = await post_generate()

                # The Perchance generator sometimes returns {"status":"generating"}
                # in heavy-load cases; re-issue once with the same params.
                if gen_json.get("status") == "generating":
                    await page.wait_for_timeout(3000)
                    gen_json = await post_generate()

                if gen_json.get("status") != "success":
                    reason = gen_json.get("reason") or gen_json.get("status") or "unknown"
                    await browser.close()
                    print(f"ERROR:GENERATE:{str(reason)[:80]}")
                    return

                image_id    = gen_json.get("imageId")
                file_ext    = (gen_json.get("fileExtension") or "jpeg").lstrip(".")
                proxy_url   = gen_json.get("imageDownloadUrl")

                # 3. Download. Prefer the proxy URL (modern path), fall back to
                # the classic /api/downloadTemporaryImage?imageId= route. Both
                # are fetched via page.request so browser cookies travel.
                download_urls = []
                if isinstance(proxy_url, str) and proxy_url:
                    if proxy_url.startswith("http"):
                        download_urls.append(proxy_url)
                    elif proxy_url.startswith("/"):
                        download_urls.append("https://image-generation.perchance.org" + proxy_url)
                    elif proxy_url.startswith("v1."):
                        download_urls.append(
                            "https://image-generation.perchance.org/downloadTemporaryImageViaProxy?t=" + proxy_url
                        )
                if image_id:
                    download_urls.append(f"{API}/downloadTemporaryImage?imageId={image_id}")

                image_bytes = None
                content_type = ""
                for url in download_urls:
                    try:
                        r = await page.request.get(url, {"timeout": 60000})
                        if not r.ok:
                            continue
                        buf = await r.body()
                        if buf and len(buf) > 0:
                            image_bytes = buf
                            content_type = (r.headers.get("content-type") or "").lower()
                            break
                    except Exception:
                        continue

                await browser.close()

                if not image_bytes:
                    print("ERROR:DOWNLOAD")
                    return

                # Save bytes to OUTFILE; derive a sensible extension from Content-Type.
                with open(OUTFILE, "wb") as f:
                    f.write(image_bytes)

                if "png" in content_type:
                    ext = "png"
                elif "webp" in content_type:
                    ext = "webp"
                elif "jpeg" in content_type or "jpg" in content_type:
                    ext = "jpg"
                else:
                    # Use the fileExtension field Perchance returned.
                    ext = "jpg" if file_ext in ("jpeg", "jpg", "") else file_ext
                print("OK:" + ext)

        asyncio.run(main())
        PYEOF
        )
        PYEXIT=$?
        if [ $PYEXIT -ne 0 ] || [ -z "$GENRESULT" ]; then
          # Python crashed before printing OK/ERROR (e.g. a missing env
          # var, Playwright launch failure, unhandled exception, etc.).
          # Surface a best-effort message so the user is not stuck with
          # the generic "unknown error" branch.
          notify_user "❌ خطای داخلی اسکریپت. ممکنه Perchance موقتاً مسدود باشه — چند دقیقه بعد دوباره امتحان کن."
          exit 0
        fi
        echo "GENRESULT=$GENRESULT"

        # Failure handling — the Python script prints ERROR:* on failures.
        case "$GENRESULT" in
          ERROR:RATE_LIMIT)
            notify_user "❌ Perchance به محدودیت نرخ رسیده. چند دقیقه بعد امتحان کن."
            exit 0
            ;;
          ERROR:CF_CHALLENGE)
            notify_user "❌ ساخت تصویر به خاطر محدودیت Perchance انجام نشد. چند دقیقه بعد امتحان کن."
            exit 0
            ;;
          ERROR:GENERATE:*)
            REASON="${GENRESULT#ERROR:GENERATE:}"
            notify_user "❌ ساخت تصویر ناموفق بود: ${REASON}"
            exit 0
            ;;
          ERROR:DOWNLOAD)
            notify_user "❌ تصویر ساخته شد ولی دانلود ناموفق بود. دوباره امتحان کن."
            exit 0
            ;;
          ERROR:*)
            notify_user "❌ خطای ناشناخته هنگام ساخت تصویر. دوباره امتحان کن."
            exit 0
            ;;
          OK:*)
            OUTEXT="${GENRESULT#OK:}"
            ;;
          *)
            notify_user "❌ خطای ناشناخته هنگام ساخت تصویر. دوباره امتحان کن."
            exit 0
            ;;
        esac

        if [ ! -s "$OUTFILE" ]; then
          notify_user "❌ تصویر ساخته شد ولی فایل خالیه. دوباره امتحان کن."
          exit 0
        fi

        # Rename to the correct extension so Bale's content-type sniffing
        # is happy (sendPhoto cares about the byte stream, not the name, but
        # some clients preview based on the extension).
        FINALFILE="/tmp/imagine_final_$$.${OUTEXT}"
        mv "$OUTFILE" "$FINALFILE"

        # Build the Persian caption that includes the prompt verbatim.
        CAPTION="✨ «${PROMPT}»"

        # Delete the progress message before sending the final image,
        # so the user sees the result replace the "در حال ساخت..." text.
        if [ -n "$MSG_ID" ]; then
          curl -s -X POST "$API/deleteMessage" -F "chat_id=$CHAT_ID" -F "message_id=$MSG_ID" > /dev/null 2>&1 || true
        fi

        # Send the image to the user chat (multipart upload — Bale must
        # NOT fetch a URL, per project policy).
        RESP=$(send_with_retry "$API/sendPhoto" \
          -F "chat_id=$CHAT_ID" \
          -F "photo=@$FINALFILE" \
          -F "caption=$CAPTION")
        if echo "$RESP" | grep -q '"ok":false'; then
          # Last-ditch: try as a document if Bale rejects the photo
          # (occurs for unusual aspect ratios or formats).
          send_with_retry "$API/sendDocument" \
            -F "chat_id=$CHAT_ID" \
            -F "document=@$FINALFILE" \
            -F "caption=$CAPTION" > /dev/null || true
        fi

        # Optional group chat fan-out.
        if [ -n "$GROUP_CHAT_ID" ] && [ "$GROUP_CHAT_ID" != "0" ]; then
          GROUP_CAPTION="✨ AI Generated\n\n${PROMPT}"
          send_with_retry "$API/sendPhoto" \
            -F "chat_id=$GROUP_CHAT_ID" \
            -F "photo=@$FINALFILE" \
            -F "caption=$GROUP_CAPTION" > /dev/null || true
        fi

        rm -f "$FINALFILE"
        exit 0
