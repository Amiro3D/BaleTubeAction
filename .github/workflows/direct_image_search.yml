name: Image Search

on:
  repository_dispatch:
    types: [bale_image_search]

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
    - name: Search and send images
      env:
        BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        QUERY: ${{ github.event.client_payload.query }}
        PAGE: ${{ github.event.client_payload.page || '1' }}
        CHAT_ID: ${{ github.event.client_payload.chat_id }}
        MSG_ID: ${{ github.event.client_payload.msg_id || '' }}
        GROUP_CHAT_ID: ${{ github.event.client_payload.group_chat_id || '' }}
        WORKER_URL: ${{ secrets.WORKER_URL }}
      run: |
        set -e
        API="https://tapi.bale.ai/bot${BALE_BOT_TOKEN}"

        encode() { python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$1"; }

        # Get vqd token
        VQD=$(curl -sS -L \
          -H "User-Agent: Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1" \
          -H "Accept: text/html,application/xhtml+xml" \
          -H "Accept-Language: en-US,en;q=0.9" \
          "https://duckduckgo.com/?q=$(encode "$QUERY")&iar=images&iax=images&ia=images" \
          | grep -oP 'vqd="[^"]*"' | head -1 | sed 's/vqd="//;s/"//')

        if [ -z "$VQD" ]; then
          curl -s -X POST "$API/sendMessage" -F "chat_id=$CHAT_ID" -F "text=🔍 No images found for this query." > /dev/null
          exit 0
        fi

        # Fetch seen thumbnails for dedup
        SEEN=$(curl -sS "${WORKER_URL}/seen-images?chat_id=$CHAT_ID" 2>/dev/null || echo '[]')

        # Get image results - fetch up to 100 (DDG max) then filter duplicates
        RESP=$(curl -sS -L \
          -H "User-Agent: Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1" \
          "https://duckduckgo.com/i.js?l=us-en&o=json&q=$(encode "$QUERY")&vqd=${VQD}&f=,,,,,&p=${PAGE}")

        # Parse results, filter duplicates against seen list, keep only unique 6
        RESULTS=$(python3 -c "
        import sys, json
        seen = set(json.loads(sys.argv[1] or '[]'))
        data = json.loads(sys.argv[2])
        all_results = data.get('results', [])
        out = []
        new_thumbs = []
        for r in all_results:
            thumb = r.get('thumbnail', '')
            img = r.get('image', '')
            if not thumb or not img:
                continue
            if thumb in seen:
                continue
            seen.add(thumb)
            new_thumbs.append(thumb)
            out.append({'t': thumb, 'u': img})
            if len(out) >= 6:
                break
        print(json.dumps({'results': out, 'new_thumbs': new_thumbs}))
        " "$SEEN" "$RESP")

        # Extract fields
        FILTERED=$(echo "$RESULTS" | python3 -c "import sys,json;print(json.dumps(json.load(sys.stdin)['results']))")
        NEW_THUMBS=$(echo "$RESULTS" | python3 -c "import sys,json;print(json.dumps(json.load(sys.stdin)['new_thumbs']))")
        COUNT=$(echo "$FILTERED" | python3 -c "import sys,json;print(len(json.load(sys.stdin)))")

        if [ "$COUNT" = "0" ]; then
          if [ -n "$MSG_ID" ]; then
            curl -s -X POST "$API/editMessageText" \
              -F "chat_id=$CHAT_ID" -F "message_id=$MSG_ID" \
              -F "text=🔍 No more images" > /dev/null
          else
            curl -s -X POST "$API/sendMessage" -F "chat_id=$CHAT_ID" -F "text=🔍 No images found" > /dev/null
          fi
          exit 0
        fi

        # Update seen list in worker KV
        curl -sS -X POST "${WORKER_URL}/seen-images" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\":\"$CHAT_ID\",\"thumbnails\":$NEW_THUMBS}" > /dev/null 2>&1 || true

        # Store full-res URLs in worker KV
        FULL_URLS=$(echo "$FILTERED" | python3 -c "import sys,json;print(json.dumps([r['u'] for r in json.load(sys.stdin)]))")
        curl -sS -X POST "${WORKER_URL}/store-image-urls" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\":\"$CHAT_ID\",\"page\":\"$PAGE\",\"urls\":$FULL_URLS}" > /dev/null 2>&1 || true

        # Delete progress/old message if paginating
        if [ -n "$MSG_ID" ]; then
          curl -s -X POST "$API/deleteMessage" -F "chat_id=$CHAT_ID" -F "message_id=$MSG_ID" > /dev/null 2>&1 || true
        fi

        # Send each thumbnail with download button
        python3 - "$FILTERED" "$QUERY" "$PAGE" "$CHAT_ID" "$API" << 'PYEOF'
        import json, os, subprocess, sys, urllib.parse

        results = json.loads(sys.argv[1])
        query = sys.argv[2]
        page = sys.argv[3]
        chat_id = sys.argv[4]
        api = sys.argv[5]
        GROUP_CHAT_ID = os.environ.get('GROUP_CHAT_ID', '')

        def send_photo(photo, keyboard=None):
            cmd = ['curl', '-s', '-X', 'POST', f'{api}/sendPhoto',
                   '-F', f'chat_id={chat_id}',
                   '-F', f'photo={photo}']
            if keyboard:
                cmd.extend(['-F', f'reply_markup={json.dumps(keyboard)}'])
            subprocess.run(cmd, capture_output=True)

        def send_photo_group(photo, caption='', keyboard=None):
            if not GROUP_CHAT_ID or GROUP_CHAT_ID in ('', 'null', '0'):
                return
            cmd = ['curl', '-s', '-X', 'POST', f'{api}/sendPhoto',
                   '-F', f'chat_id={GROUP_CHAT_ID}',
                   '-F', f'photo={photo}']
            if caption:
                cmd.extend(['-F', f'caption={caption}'])
            if keyboard:
                cmd.extend(['-F', f'reply_markup={json.dumps(keyboard)}'])
            subprocess.run(cmd, capture_output=True)

        def send_msg(text, keyboard=None):
            cmd = ['curl', '-s', '-X', 'POST', f'{api}/sendMessage',
                   '-F', f'chat_id={chat_id}',
                   '-F', f'text={text}']
            if keyboard:
                cmd.extend(['-F', f'reply_markup={json.dumps(keyboard)}'])
            subprocess.run(cmd, capture_output=True)

        def send_msg_group(text, keyboard=None):
            if not GROUP_CHAT_ID or GROUP_CHAT_ID in ('', 'null', '0'):
                return
            cmd = ['curl', '-s', '-X', 'POST', f'{api}/sendMessage',
                   '-F', f'chat_id={GROUP_CHAT_ID}',
                   '-F', f'text={text}']
            if keyboard:
                cmd.extend(['-F', f'reply_markup={json.dumps(keyboard)}'])
            subprocess.run(cmd, capture_output=True)

        # Send thumbnails with individual download buttons
        for i, r in enumerate(results):
            cb = f"imgd:{urllib.parse.quote(query)}:{page}:{i}"
            kb = {"inline_keyboard": [[{"text": "⬇️ Download Full Resolution", "callback_data": cb}]]}
            send_photo(r['t'], kb)
            send_photo_group(r['t'], f'🖼 "{query}" — Page {page}')

        # Navigation message
        nav = []
        pg = int(page)
        if pg > 1:
            nav.append({"text": "⬅️ Back", "callback_data": f"imgb:{pg-1}:{urllib.parse.quote(query)}"})
        nav.append({"text": "➡️ Next", "callback_data": f"imgn:{pg+1}:{urllib.parse.quote(query)}"})
        nav.append({"text": "❌ Close", "callback_data": "imgx"})
        kb = {"inline_keyboard": [nav]}
        send_msg(f'🖼 "{query}" — Page {page}', kb)
        send_msg_group(f'🖼 "{query}" — Page {page}', kb)
        PYEOF
